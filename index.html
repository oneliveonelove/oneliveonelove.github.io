<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return By Death - Bleach vs Naruto Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+VI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background-color: #06070a;
        }

        /* Full Screen Background */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('images/banner.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Dark overlay for readability */
        .wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(0, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 1;
        }

        /* Header Bar */
        header {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 50px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-icon {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-weight: 900;
            font-size: 1.6rem;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .logo-sub {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ff2a5f;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }

        .header-right {
            display: flex;
            gap: 20px;
        }

        /* Styled Buttons like Tencent Game Scroll Style */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.05rem;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            border: 2px solid;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .btn-android {
            background: linear-gradient(to bottom, #ffe082 0%, #ffb300 100%);
            color: #4a2d00;
            border-color: #ffe082;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .btn-android:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 179, 0, 0.6);
            background: linear-gradient(to bottom, #fff9c4 0%, #ffb300 100%);
        }

        .btn-ios {
            background: linear-gradient(to bottom, #e0f2f1 0%, #00bfa5 100%);
            color: #004d40;
            border-color: #e0f2f1;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .btn-ios:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 191, 165, 0.6);
            background: linear-gradient(to bottom, #f3e5f5 0%, #00bfa5 100%);
        }

        /* Bottom Section containing Titles */
        .bottom-section {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 50px 60px 80px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .main-title {
            font-weight: 900;
            font-size: 4.5rem;
            line-height: 1.05;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
            margin-bottom: 8px;
        }

        .main-title span {
            background: linear-gradient(135deg, #ff2a5f 0%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.15rem;
            color: #e2e8f0;
            max-width: 580px;
            font-weight: 400;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            line-height: 1.5;
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                flex-direction: column;
                gap: 20px;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .btn {
                flex: 1;
                text-align: center;
                padding: 12px 6px;
                font-size: 0.82rem;
            }

            .bottom-section {
                padding: 30px 20px 40px;
                align-items: center;
                text-align: center;
            }

            .main-title {
                font-size: 2.8rem;
                letter-spacing: -1px;
            }

            .tagline {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="header-left">
                <img src="images/icon.png" alt="Return By Death Icon" class="game-icon">
                <div class="logo-text">
                    <span class="logo-main">RETURN BY DEATH</span>
                    <span class="logo-sub">Bleach vs Naruto Mobile</span>
                </div>
            </div>
            <div class="header-right">
                <a href="https://android.rbyd.me" class="btn btn-android">TẢI ANDROID</a>
                <a href="https://iossideload.rbyd.me" class="btn btn-ios">TẢI IOS-SIDELOAD</a>
            </div>
        </header>

        <div class="bottom-section">
            <h2 class="main-title">RETURN BY <span>DEATH</span></h2>
            <p class="tagline">Kỷ nguyên đối kháng trực tuyến Anime huyền thoại tái sinh trên di động với cơ chế P2P Netplay đồng bộ mượt mà.</p>
        </div>
    </div>
</body>
</html>
